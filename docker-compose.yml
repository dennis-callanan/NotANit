# NotANit — one-command runs.
#
#   1. cp .env.example .env            # fill in secret VALUES
#   2. cp config.example.yaml config.yaml   # set provider, project_path, etc.
#      -> set `pipeline.repo_root: /repo` in config.yaml
#   3. TARGET_REPO=/abs/path/to/repo docker compose run --rm notanit
#
# `env_file` injects the secrets from .env into the container, where the config's
# ${VAR} references resolve them. config.yaml and the target repo are mounted in;
# proposals are written to /repo/proposals (visible in TARGET_REPO on the host).

services:
  notanit:
    # Builds from this checkout. To use the published image instead, replace the
    # `build: .` line with:  image: ghcr.io/<your-org>/notanit:latest
    build: .
    image: notanit
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ${TARGET_REPO:-./repo}:/repo
