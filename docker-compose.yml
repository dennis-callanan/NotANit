# NotANit — one-command runs.
#
#   1. cp .env.example .env            # fill in secret VALUES
#   2. cp config.example.yaml config.yaml   # set provider, project_path, etc.
#      -> set `pipeline.target_root: /docs` in config.yaml
#   3. TARGET_DOCS=/abs/path/to/docs-folder docker compose run --rm notanit
#
# `env_file` injects the secrets from .env into the container, where the config's
# ${VAR} references resolve them. config.yaml and the target docs folder are mounted
# in; the doc files are edited in place (visible in TARGET_DOCS on the host).

services:
  notanit:
    # Builds from this checkout. To use the published image instead, replace the
    # `build: .` line with:  image: ghcr.io/<your-org>/notanit:latest
    build: .
    image: notanit
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ${TARGET_DOCS:-./docs}:/docs
