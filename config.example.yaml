# NotANit — example configuration
#
# Precedence is:  environment variable  >  this file  >  built-in default
#
# Copy to `config.yaml` (read from the working directory), edit, and run:
#   python3 -m scripts.notanit.main
#
# Any value may reference an environment variable with ${VAR}; it is resolved
# from .env (then your shell) at load time. Credentials are referenced this way,
# so this file documents what each provider needs while the secret values live in
# .env — see .env.example. (Write a literal secret here and you'll get a warning.)

# ===========================================================================
# INTEGRATIONS — how NotANit connects to the systems it needs to function.
# Where to read code-review history from (your SCM) and which model writes the
# edits (your LLM): URLs, models, keys, tokens. Set these once per environment.
# ===========================================================================

scm:
  provider: gitlab            # "gitlab" or "github"
  url: https://gitlab.com     # GitHub: https://api.github.com (or .../api/v3 for Enterprise)
  project_path: mygroup/myrepo
  token: ${SCM_TOKEN}         # value from .env (GitLab: read_api, GitHub: repo read)
  # TLS verification. Behind a corporate TLS-inspection proxy (Zscaler, Netskope,
  # etc.) you'll hit "self-signed certificate in certificate chain" — point this at
  # the proxy's root CA so the default bundle trusts it:
  # ca_bundle: /path/to/corporate-ca-bundle.pem
  # verify_tls: false         # last resort: skip verification entirely (insecure)

llm:
  # `provider` is OPTIONAL: if you configure only one of the blocks below, it's
  # inferred. It's only needed to disambiguate — like here, where both blocks are
  # filled in so you can switch between them by changing this one line.
  provider: anthropic         # "anthropic" or "bedrock"
  max_tokens: 4096            # shared across providers

  # Settings for the Anthropic direct API.
  anthropic:
    model_id: claude-sonnet-4-6
    api_key: ${ANTHROPIC_API_KEY}            # value from .env
    # api_base: https://api.anthropic.com    # override for proxies/gateways
    # api_version: 2023-06-01

  # Settings for AWS Bedrock.
  bedrock:
    model_id: us.anthropic.claude-sonnet-4-6   # cross-region inference profile
    aws_region: us-east-1
    aws_role_arn: ""          # set to assume a role before calling Bedrock (optional)
    aws_access_key_id: ${AWS_ACCESS_KEY_ID}          # value from .env
    aws_secret_access_key: ${AWS_SECRET_ACCESS_KEY}  # value from .env
    aws_session_token: ${AWS_SESSION_TOKEN}          # only for temporary (ASIA...) creds
    # api_version: bedrock-2023-05-31

# ===========================================================================
# CONTROLS — the dials that tune what NotANit does on each run.
# How far back to look, how many edits to make, and what counts as signal vs
# noise. These shape the behaviour of a run; tweak them freely.
# ===========================================================================

pipeline:
  target_root: .              # folder that contains the target_files below
                              # (in Docker this is the mounted path, e.g. /docs)
  weeks: 8                    # how far back to look
  target_files:              # the guidance docs to read & edit in place
    - AGENTS.md
  max_changes: 3              # most edits to apply per run
  min_mr_occurrences: 3       # a theme must recur across at least this many MRs/PRs
  min_comment_length: 20      # comments shorter than this are dropped as noise

  # Themes are lexical buckets: a comment is assigned to the FIRST theme whose
  # keyword it contains. Replace or extend these for how YOUR team reviews.
  theme_keywords:
    testing: [test, spec, coverage, regression, mock, stub, assert]
    error_handling: [error, exception, raise, catch, handle, graceful]
    types: [type hint, typing, mypy, annotation, typed]
    documentation: [docstring, comment, doc, readme, changelog]
    naming: [naming, rename, variable name, function name, misleading]
    code_structure: [extract, refactor, split, too long, complexity, abstraction]
    security: [secret, credential, token, auth, permission, sensitive]
    performance: ["n+1", query, performance, slow, cache, batch]

  # Extra low-signal phrases to drop (case-insensitive substring match).
  noise_patterns:
    - lgtm
    - looks good
    - approved
    - thanks
    - "+1"

  # OPTIONAL free-text instructions appended to the LLM prompt. Use this to nudge
  # tone or scope without touching code, e.g.:
  # extra_guidance: >
  #   Prefer imperative phrasing ("Write a test for…"). Never propose changes
  #   about code formatting — that is handled by our auto-formatter.
